spring.application.name=Zoner-Backend-API-spring_boot

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Naming
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Auth Properties
zoner.auth.verification-code-expiry=10m
zoner.auth.verification-code-length=6
zoner.auth.max-verification-attempts=5
zoner.auth.resend-cooldown-seconds=60

# Mail

spring.mail.host=${MAIL_HOST}

spring.mail.port=${MAIL_PORT}

spring.mail.username=${MAIL_USERNAME}

spring.mail.password=${MAIL_PASSWORD}

spring.mail.protocol=${MAIL_PROTOCOL}

spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}

spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS}

spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT}

spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT}

spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT}

zoner.mail.from=${MAIL_FROM}